{% extends 'base.html' %}
{% block title %}Novo episódio • Mari-Olivier{% endblock %}
{% block content %}
<section class="profile-form-card">
  <h1 class="section-title">Novo episódio</h1>
  <form method="post" enctype="multipart/form-data" class="form-grid two-col">
    {{ form.hidden_tag() }}
    <label class="full-span">Temporada
      <select name="season_id">
        {% for season in seasons %}
        <option value="{{ season.id }}">{{ season.title }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="full-span">{{ form.title.label }} {{ form.title() }}</label>
    <label class="full-span">{{ form.description.label }} {{ form.description(rows=4) }}</label>
    <label>{{ form.thumbnail_url.label }} {{ form.thumbnail_url(placeholder='Cole uma URL da thumb se preferir') }}</label>
    <label>{{ form.video_url.label }} {{ form.video_url(placeholder='Cole uma URL do vídeo se preferir') }}</label>
    <label>Upload da thumb
      <input type="file" name="thumbnail_file" accept=".png,.jpg,.jpeg,.webp,.svg">
    </label>
    <label>Upload do vídeo
      <input type="file" name="video_file" accept=".mp4,.mov,.m4v,.webm">
    </label>
    <label>{{ form.duration_minutes.label }} {{ form.duration_minutes() }}</label>
    <label>{{ form.status.label }} {{ form.status() }}</label>
    <label class="full-span">{{ form.premiere_label.label }} {{ form.premiere_label() }}</label>
    <div class="full-span form-note">Você pode usar URL ou upload. Se enviar arquivo, ele terá prioridade.</div>
    <div class="full-span">{{ form.submit(class_='btn btn-primary') }}</div>
  </form>
</section>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Bônus • Mari-Olivier{% endblock %}
{% block content %}
<section>
  <h1 class="section-title">Bônus</h1>
  <div class="card-grid three-col">
    {% for item in items %}
    <article class="info-card tall">
      <div class="info-thumb" style="background-image:url('{{ item.image_url }}')"></div>
      <div class="info-body">
        <span class="tag">{{ item.cta_label }}</span>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
        <a class="btn btn-primary" href="{{ item.cta_url }}">{{ item.cta_label }}</a>
      </div>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Notificações • Mari-Olivier{% endblock %}
{% block content %}
<section>
  <h1 class="section-title">Notificações</h1>
  <div class="stack-list">
    {% for notification in notifications %}
    <article class="stack-card">
      <div>
        <strong>{{ notification.title }}</strong>
        <p>{{ notification.body }}</p>
      </div>
      <form method="post" action="{{ url_for('notification_read', notification_id=notification.id) }}">
        <button class="btn btn-ghost">{{ 'Lida' if notification.is_read else 'Marcar como lida' }}</button>
      </form>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
